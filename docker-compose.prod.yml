version: '3.8'

# Production Docker Compose
# Use this for deploying to DigitalOcean/AWS with managed database

services:
  # Note: PostgreSQL and Redis are managed services (Neon/Redis Cloud)
  # Remove these if using managed databases

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: islandfund_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5001
      # Database - from managed service
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis - from managed service
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Security
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}
    ports:
      - "5001:5001"
    networks:
      - islandfund_network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: islandfund_web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com}
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - islandfund_network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  islandfund_network:
    driver: bridge
